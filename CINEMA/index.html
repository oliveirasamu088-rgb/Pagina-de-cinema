<body>
<img src="imagens/logo1.png" alt="Logo" class="logo">

<main class="main-content">
</main>
<div id="footer-placeholder"></div>
.
.
<div class="banner"></div>
<div class="carousel-container">
<div class="carousel-track">
<div class="slide" style="background-image: url('imagens/filme1.jpg');"></div>
<div class="slide" style="background-image: url('imagens/filme2.jpg');"></div>
<div class="slide" style="background-image: url('imagens/filme3.jpg');"></div>
<div class="slide" style="background-image: url('imagens/filme4.jpg');"></div>
<div class="slide" style="background-image: url('imagens/filme5.jpg');"></div>
</div>
<button class="btn-prev" onclick="moveSlide(-1)">&#10094;</button>
<button class="btn-next" onclick="moveSlide(1)">&#10095;</button>
</div>
.
.

 <script>
// Puxa o cabeçalho
fetch('includes/header.html')
.then(response=> response.text())
.then(data=>{
document.getElementById('header-placeholder').innerHTML =data;
});
// Puxa o rodapé
fetch('includes/footer.html')
.then(response=> response.text())
.then(data=>{
document.getElementById('footer-placeholder').innerHTML=data;
fetch('includes/footer.html')
.then(response => response.text())
.then(data => {
document.getElementById('footer-placeholder').innerHTML = data;
});
let currentIndex = 0;
function moveSlide(direction) {
const track = document.querySelector('.carousel-track');
const slides = document.querySelectorAll('.slide');
const totalSlides = slides.length;
currentIndex += direction;
if (currentIndex >= totalSlides) {
currentIndex = 0;
} else if (currentIndex < 0) {
currentIndex = totalSlides- 1;
}
// Calcula o deslocamento
const offset =-currentIndex * 100;
track.style.transform = `translateX(${offset}vw)`;
} 
});

</script>
</script>
</body>
